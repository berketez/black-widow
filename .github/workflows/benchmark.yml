name: Benchmark CI Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    name: Benchmark Smoke + renamed_f1 Gate
    runs-on: ubuntu-latest
    # ubuntu-24.04-arm (native arm64) is GA as of 2026-01 for public repos.
    # Switch to "ubuntu-24.04-arm" when the fixture binary matters for arch fidelity.
    # For now ubuntu-latest (x86_64) is fine: all tests use pre-computed fixtures.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install karadul (core + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[binary,computation,dev]"
          pip install pytest pytest-cov

      # NOTE: Ghidra headless is deliberately omitted in this phase.
      # Ghidra requires 2 GB+ download + 10 min setup; it is deferred to a
      # separate workflow (ghidra-ci.yml) targeting v1.12+.
      # All benchmark tests here use pre-computed fixtures from
      # tests/benchmark/fixtures/linux_elf_stripped/ and the committed
      # baseline JSON at benchmarks/stripped_baseline_2026_04_23_real.json.

      - name: Run benchmark smoke tests
        run: |
          pytest tests/benchmark/ -m "" -q --tb=short
        # -m "" overrides pyproject.toml's default marker filter so that
        # benchmark-marked tests are included in this job.

      - name: Check renamed_f1 gate against committed baseline
        run: |
          python scripts/ci_baseline_check.py \
            --baseline benchmarks/stripped_baseline_2026_04_23_real.json \
            --floor 0.0

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            benchmarks/stripped_baseline_2026_04_23_real.json
          retention-days: 30

      - name: Post gate result to job summary
        if: always()
        run: |
          python -c "
          import json, sys
          path = 'benchmarks/stripped_baseline_2026_04_23_real.json'
          with open(path) as f:
              data = json.load(f)
          m = data.get('metrics', {})
          rf1 = m.get('renamed_f1', 0.0)
          print('## Karadul Benchmark Gate', flush=True)
          print('', flush=True)
          print(f'| Metric | Value |', flush=True)
          print(f'|--------|-------|', flush=True)
          print(f'| renamed_f1 | {rf1:.4f} |', flush=True)
          print(f'| accuracy | {m.get(\"accuracy\", 0.0):.4f} |', flush=True)
          print(f'| f1 | {m.get(\"f1\", 0.0):.4f} |', flush=True)
          print(f'| fun_residue_pct | {m.get(\"fun_residue_pct\", 0.0):.2f}% |', flush=True)
          print('', flush=True)
          print('> Floor: renamed_f1 >= 0.0 (v1.11 beta; will raise to 0.5 in v1.13)', flush=True)
          " >> \$GITHUB_STEP_SUMMARY
